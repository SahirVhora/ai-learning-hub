name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check data.js
      - name: Run DOM smoke tests
        run: |
          npm ci
          npx playwright install --with-deps chromium
          npm test
      - name: Extract URLs
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          grep -RhoE 'https?://[^"'"'"' )]+' README.md data.js index.html docs 2>/dev/null > urls.txt || true
          sort -u -o urls.txt urls.txt
          cat urls.txt
      - name: Check URLs
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --max-concurrency 4 --timeout 20 --max-redirects 5 --exclude '^http://localhost(:[0-9]+)?(/.*)?$' --exclude '^https://claude\.ai' --exclude '^https://www\.alignmentforum\.org' --exclude '^https://www\.youtube\.com/results\?' --exclude '^https://huggingface\.co' --exclude '^https://www\.deeplearning\.ai' urls.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
